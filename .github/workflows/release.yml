name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write  # required for OIDC trusted publishing + provenance attestation

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Activate npm 11 via corepack (OIDC trusted publishing needs ≥11.5.1)
        run: |
          corepack enable
          corepack prepare npm@11.6.0 --activate
          npm --version

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to npm (keyless OIDC trusted publishing, with provenance)
        run: npm publish --provenance --access public
        # No NODE_AUTH_TOKEN needed — npm CLI ≥ 11.5.1 reads the GitHub OIDC
        # token via the id-token:write permission and exchanges it directly.
        # Trust is configured at:
        #   https://www.npmjs.com/package/@pathcosmos/dleft/access
