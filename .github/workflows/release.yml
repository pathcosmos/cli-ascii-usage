name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write  # provenance attestation (sigstore via GitHub OIDC)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to npm (NPM_TOKEN auth + provenance)
        # Reverted to NPM_TOKEN after multiple failed attempts at OIDC trusted
        # publishing — npm CLI was bypassing OIDC because of an _auth value
        # from somewhere we couldn't track down within the time budget. The
        # provenance attestation does NOT depend on auth method — it's signed
        # via id-token:write + sigstore regardless.
        # TODO: revisit trusted publishing once we can isolate the _auth source.
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
