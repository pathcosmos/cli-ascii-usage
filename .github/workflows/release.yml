name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Show toolchain + OIDC env
        run: |
          node --version
          npm --version
          echo "ACTIONS_ID_TOKEN_REQUEST_URL set? $([ -n \"$ACTIONS_ID_TOKEN_REQUEST_URL\" ] && echo yes || echo no)"
          echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN set? $([ -n \"$ACTIONS_ID_TOKEN_REQUEST_TOKEN\" ] && echo yes || echo no)"
          echo "--- npm config ---"
          npm config list -l | grep -E "^(registry|provenance|always-auth|_auth)" || echo "(no matches)"

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish (verbose, OIDC trusted publishing)
        run: npm publish --provenance --access public --loglevel=verbose
