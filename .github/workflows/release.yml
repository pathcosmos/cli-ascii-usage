name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write  # required for provenance attestation (sigstore via GitHub OIDC)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to npm (with provenance)
        # First publish uses NPM_TOKEN (npm trusted publishing requires the
        # package to already exist). After v0.1.0 lands, configure trusted
        # publishing on the package settings page and this token becomes
        # unused. Provenance is independent of the auth method — driven by
        # id-token:write + --provenance flag.
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
