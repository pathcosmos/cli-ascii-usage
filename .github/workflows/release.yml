name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write  # required for OIDC trusted publishing + provenance attestation

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24 (ships with npm ≥11.5.1 for OIDC trusted publishing)
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          # NOTE: intentionally NOT setting registry-url. setup-node writes a
          # .npmrc with `_authToken=${NODE_AUTH_TOKEN}` when registry-url is
          # set, and an empty token short-circuits the OIDC trusted-publishing
          # flow. Default registry from package.json + npm CLI is fine.

      - name: Show toolchain versions
        run: |
          node --version
          npm --version

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to npm (keyless OIDC trusted publishing, with provenance)
        run: npm publish --provenance --access public
        # No NODE_AUTH_TOKEN. npm CLI ≥11.5.1 sees no auth token in .npmrc,
        # then exchanges the GitHub OIDC id-token for an npm publish ticket.
        # Trust is configured at:
        #   https://www.npmjs.com/package/@pathcosmos/dleft/access
