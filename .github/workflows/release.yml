name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Dump and remove setup-node .npmrc (block OIDC bypass via _auth)
        run: |
          echo "NPM_CONFIG_USERCONFIG = $NPM_CONFIG_USERCONFIG"
          if [ -n "$NPM_CONFIG_USERCONFIG" ] && [ -f "$NPM_CONFIG_USERCONFIG" ]; then
            echo "--- contents ---"
            cat "$NPM_CONFIG_USERCONFIG" | sed 's/=.*/=<redacted>/'
            echo "--- removing ---"
            rm "$NPM_CONFIG_USERCONFIG"
          fi
          echo "--- npm config _auth ---"
          npm config get _auth || true
          echo "--- npm config registry ---"
          npm config get registry

      - name: Show toolchain + OIDC env
        run: |
          node --version
          npm --version
          echo "ACTIONS_ID_TOKEN_REQUEST_URL set? $([ -n \"$ACTIONS_ID_TOKEN_REQUEST_URL\" ] && echo yes || echo no)"

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish (verbose, OIDC trusted publishing)
        run: npm publish --provenance --access public --loglevel=verbose
        env:
          NPM_CONFIG_USERCONFIG: ""
